<p-toast position="top-right"></p-toast>

<div class="change-password-page">
  <p-card>
    <ng-template pTemplate="header">
      <div class="card-header">
        <h2>Changement obligatoire du mot de passe</h2>
        <p>Pour securiser votre compte, veuillez definir un nouveau mot de passe.</p>
      </div>
    </ng-template>

    <form (ngSubmit)="submit()" class="change-password-form">
      <div class="form-group">
        <label for="email">Email de confirmation</label>
        <input
          id="email"
          type="email"
          pInputText
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
        <small class="email-hint" *ngIf="expectedEmail">Compte connecte: {{ expectedEmail }}</small>
      </div>

      <div class="form-group">
        <label for="currentPassword">Mot de passe actuel</label>
        <input
          id="currentPassword"
          type="password"
          pInputText
          [(ngModel)]="currentPassword"
          name="currentPassword"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="form-group">
        <label for="newPassword">Nouveau mot de passe</label>
        <input
          id="newPassword"
          type="password"
          pInputText
          [(ngModel)]="newPassword"
          name="newPassword"
          autocomplete="new-password"
          required
        />
        <ul class="password-rules">
          <li *ngFor="let rule of passwordRules">{{ rule }}</li>
        </ul>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmation du mot de passe</label>
        <input
          id="confirmPassword"
          type="password"
          pInputText
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          autocomplete="new-password"
          required
        />
      </div>

      <button
        pButton
        type="submit"
        [label]="loading ? 'Mise a jour...' : 'Changer le mot de passe'"
        [loading]="loading"
        [disabled]="loading"
        class="submit-btn"
      ></button>
    </form>
  </p-card>
</div>

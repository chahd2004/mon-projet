<div class="login-page">
  <p-toast></p-toast>

  <p-card class="login-card">
    <ng-template pTemplate="header">
      <div class="card-header">
        <h1>Connexion</h1>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      <form class="form-container" (ngSubmit)="login()">
        <div class="form-group">
          <label for="email">EMAIL</label>
          <input pInputText id="email" name="email" autocomplete="email" [(ngModel)]="email" type="email" placeholder="votre@email.com" [disabled]="loading" />
        </div>

        <div class="form-group">
          <label for="password">MOT DE PASSE</label>
          <input pInputText id="password" name="password" autocomplete="current-password" [(ngModel)]="password" type="password" placeholder="Entrez votre mot de passe"
            [disabled]="loading" />
        </div>


        <p-button type="submit" label="Se connecter" icon="pi pi-sign-in" [loading]="loading" [disabled]="loading"
          styleClass="w-full p-button-primary"></p-button>
      </form>
    </ng-template>

    <ng-template pTemplate="footer">
      <div class="card-footer">
        <p *ngIf="isAdminContext">
          Pas encore inscrit?
          <a (click)="navigateToRegister()" class="link">Créer un compte</a>
        </p>
        <p>
          <a (click)="navigateToHome()" class="link">← Retour à l'accueil</a>
        </p>
      </div>
    </ng-template>
  </p-card>
</div>

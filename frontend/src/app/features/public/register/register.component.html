<div class="register-page">
  <p-toast></p-toast>

  <p-card class="register-card">
    <ng-template pTemplate="header" *ngIf="!isRegisterClientMode">
      <div class="card-header">
        <h1>Inscription</h1>
      </div>
    </ng-template>

    <div class="form-container">
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input
          pInputText
          id="prenom"
          [(ngModel)]="prenom"
          type="text"
          placeholder="Votre prénom"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="nom">Nom</label>
        <input
          pInputText
          id="nom"
          [(ngModel)]="nom"
          type="text"
          placeholder="Votre nom"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          pInputText
          id="email"
          [(ngModel)]="email"
          type="email"
          placeholder="votre@email.com"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="telephone">Téléphone (optionnel)</label>
        <input
          pInputText
          id="telephone"
          [(ngModel)]="telephone"
          type="text"
          placeholder="+216 XX XXX XXX"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          pInputText
          id="password"
          [(ngModel)]="password"
          type="password"
          placeholder="Entrez un mot de passe"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer mot de passe</label>
        <input
          pInputText
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          type="password"
          placeholder="Confirmez votre mot de passe"
          [disabled]="loading"
        />
      </div>

      <div class="form-group checkbox">
        <p-checkbox [(ngModel)]="acceptConditions" [binary]="true"></p-checkbox>
        <label>
          J'accepte les
          <a href="#" class="link">conditions d'utilisation</a>
        </label>
      </div>

      <div class="form-actions">
        <p-button
          label="S'inscrire"
          icon="pi pi-user-plus"
          (click)="register()"
          [loading]="loading"
          [disabled]="loading"
          styleClass="w-full p-button-primary"
        ></p-button>

        <p-button
          label="Se connecter"
          icon="pi pi-sign-in"
          (click)="navigateToLogin()"
          [disabled]="loading"
          styleClass="w-full p-button-outlined"
        ></p-button>
      </div>
    </div>

    <ng-template pTemplate="footer" *ngIf="!isRegisterClientMode">
      <div class="card-footer">
        <p>
          Vous avez déjà un compte?
          <a (click)="navigateToLogin()" class="link">Se connecter</a>
        </p>
        <p>
          <a (click)="navigateToHome()" class="link">← Retour à l'accueil</a>
        </p>
      </div>
    </ng-template>
  </p-card>
</div>

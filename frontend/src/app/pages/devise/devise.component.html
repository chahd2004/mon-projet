<div class="devise-container">
  <h1>Gestion des devises</h1>
  <form class="devise-form" (submit)="onSubmit($event)">
    <div class="form-row">
      <div class="form-group">
        <label for="code">Code devise</label>
        <select id="code" name="code" class="form-control" [(ngModel)]="code" (change)="onCodeChange()" required>
          <option value="">-- Choisir une devise --</option>
          <option value="USD">Dollar américain (USD)</option>
          <option value="EUR">Euro (EUR)</option>
          <option value="GBP">Livre sterling (GBP)</option>
          <option value="JPY">Yen japonais (JPY)</option>
          <option value="CAD">Dollar canadien (CAD)</option>
          <option value="AUD">Dollar australien (AUD)</option>
          <option value="CHF">Franc suisse (CHF)</option>
          <option value="MAD">Dirham marocain (MAD)</option>
          <option value="TND">Dinar tunisien (TND)</option>
          <option value="DZD">Dinar algérien (DZD)</option>
          <option value="">Autre (saisir manuellement)</option>
        </select>
        <input *ngIf="code === ''" id="code-manuel" name="code-manuel" type="text" class="form-control" [(ngModel)]="code" placeholder="Ex: EUR" required />
      </div>
      <div class="form-group">
        <label for="libelle">Libellé</label>
        <input id="libelle" name="libelle" type="text" class="form-control" [(ngModel)]="libelle" placeholder="Ex: Euro" required />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="symbole">Symbole</label>
        <input id="symbole" name="symbole" type="text" class="form-control" [(ngModel)]="symbole" placeholder="Ex: €" required />
      </div>
      <div class="form-group">
        <label for="pays">Pays</label>
        <select id="pays" name="pays" class="form-control" [(ngModel)]="pays" required>
          <option value="">-- Choisir un pays --</option>
          <option value="France">France</option>
          <option value="Tunisie">Tunisie</option>
          <option value="Maroc">Maroc</option>
          <option value="Algérie">Algérie</option>
          <option value="États-Unis">États-Unis</option>
          <option value="Canada">Canada</option>
          <option value="Royaume-Uni">Royaume-Uni</option>
          <option value="Japon">Japon</option>
          <option value="Australie">Australie</option>
          <option value="Suisse">Suisse</option>
          <option value="Union européenne">Union européenne</option>
          <option value="Chine">Chine</option>
          <option value="Espagne">Espagne</option>
          <option value="Italie">Italie</option>
          <option value="Allemagne">Allemagne</option>
          <option value="Russie">Russie</option>
          <option value="Brésil">Brésil</option>
          <option value="Inde">Inde</option>
          <option value="Turquie">Turquie</option>
          <option value="Égypte">Égypte</option>
          <option value="Afrique du Sud">Afrique du Sud</option>
          <option value="Mexique">Mexique</option>
          <option value="Arabie Saoudite">Arabie Saoudite</option>
          <option value="Corée du Sud">Corée du Sud</option>
          <option value="Pays-Bas">Pays-Bas</option>
          <option value="Belgique">Belgique</option>
          <option value="Autre">Autre (saisir manuellement)</option>
        </select>
        <input *ngIf="pays === 'Autre'" id="pays-manuel" name="pays-manuel" type="text" class="form-control" [(ngModel)]="pays" placeholder="Saisir le pays" required />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="taux">Taux de change</label>
        <input id="taux" name="taux" type="number" step="0.0001" class="form-control" [(ngModel)]="taux" placeholder="Ex: 3.2500" required />
      </div>
      <div class="form-group">
        <label for="precision">Précision décimale</label>
        <input id="precision" name="precision" type="number" min="0" max="4" class="form-control" [(ngModel)]="precision" placeholder="Ex: 2" required />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="utilisable">Utilisable</label>
        <select id="utilisable" name="utilisable" class="form-control" [(ngModel)]="utilisable" required>
          <option value="true">Oui</option>
          <option value="false">Non</option>
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer</button>
  </form>
  <div *ngIf="message" class="alert alert-info" style="margin-top:1rem;">{{ message }}</div>

  <div class="devises-list" *ngIf="devises.length">
    <h2 style="margin-top:2rem;">Liste des devises enregistrées</h2>
    <table class="devises-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Libellé</th>
          <th>Symbole</th>
          <th>Pays</th>
          <th>Taux</th>
          <th>Précision</th>
          <th>Utilisable</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of devises; let i = index">
          <td>{{ d.code }}</td>
          <td>{{ d.libelle }}</td>
          <td>{{ d.symbole }}</td>
          <td>{{ d.pays }}</td>
          <td>{{ d.taux }}</td>
          <td>{{ d.precision }}</td>
          <td>{{ d.utilisable ? 'Oui' : 'Non' }}</td>
          <td>
            <button class="btn-editer" (click)="editDevise(i)">Éditer</button>
            <button class="btn-supprimer" (click)="supprimerDevise(i)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div *ngIf="message" class="alert alert-info" style="margin-top:1rem;">{{ message }}</div>
</div>

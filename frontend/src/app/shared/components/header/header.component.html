<div class="header-container">
  <div class="header-content">
    <div class="header-brand">
      <h1>Facturation</h1>
    </div>

    <div class="header-actions">
      <div class="user-section">
        <span class="user-name">{{ currentUser()?.prenom }} {{ currentUser()?.nom }}</span>
        <p-avatar 
          [label]="getInitials()" 
          shape="circle"
          size="large"
          styleClass="avatar-bg"
        ></p-avatar>
      </div>
    </div>
  </div>
</div>
